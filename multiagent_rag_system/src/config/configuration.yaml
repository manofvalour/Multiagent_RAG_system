app:
  app_name: "MultiAgentRAG"
  app_version: "1.0.0"
  debug: false
  log_level: "INFO"

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"

database:
  database_url: "postgresql+asyncpg://rag:rag@localhost:5432/ragdb"
  db_pool_size: 10
  db_max_overflow: 20
  db_pool_timeout: 30

reranker:
  enabled: true
  top_n: 5                      # chunks kept after reranking
  model: "BAAI/bge-reranker-v2-m3"

redis:
  redis_url: 'redis://localhost:6379/0'
  cache_ttl_seconds: 3600
  session_ttl_second: 86400
  enabled: true
  similarity_threshold: 0.92    # reuse cached answer if query is ≥92% similar

auth:
  jwt_algorithm: "HS256"
  jwt_expire_minutes: 60
  api_key_header: "X-API-Key"

llm:
  active_providers: 'groq'
  system_prompt: |
    You are a precise, helpful assistant.
    Answer the question using ONLY the provided context.
    If the context does not contain the answer, say so clearly.

  providers:
    groq: 
      base_url: "https://api.groq.com/openai/v1/chat/completions"
      model_name: 'openai/gpt-oss-120b'
      temperature: 0.2
      max_output_tokens: 2048

    anthropic:
      base_url: "https://api.anthropic.com/v1/messages"
      model_name: "claude-sonnet-4-20250514"
      max_output_tokens: 2048
      temperature: 0.0
      timeout_seconds: 30 

embedding:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  embedding_dim: 384
  embedding_batch_size: 64

vector_store:
  vector_store_type: 'faiss'
  faiss_index_path: "./data/faiss.index"
  top_k_retrieval: 10
  top_k_after_rerank: 5


agents_info:
  consensus_n_agents: 5
  retrieval_relevance_threshold: 0.12
  claim_support_threshold: 0.20
  confidence_low_threshold: 0.65
  confidence_medium)threshold: 0.40

rate_limiting:
  rate_limit_requests: 60
  rate_limit_window_seconds: 60

observability:
  enable_metrics: true
  enable_tracing: true
  otlp_endpoint: "http://localhost:4317"
  sentry_dsn: ""

